apiVersion: apps/v1
kind: Deployment
metadata:
  name: deathstar-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: deathstar-api
  template:
    metadata:
      labels:
        app: deathstar-api
    spec:
      containers:
        - name: api
          image: sre-backend-arena_api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081

          # readiness: pod pronto para receber tráfego
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          # liveness: reinicia se travar
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          # startup: evita matar app durante boot
          startupProbe:
            httpGet:
              path: /health
              port: 8081
            failureThreshold: 30
            periodSeconds: 2

          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"