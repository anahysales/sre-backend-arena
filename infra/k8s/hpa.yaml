apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: deathstar-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: deathstar-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 50
          periodSeconds: 30