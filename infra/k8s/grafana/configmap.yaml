apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-deathstar
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  dashboard.json: |
    {
      "title": "Deathstar API - SRE Overview",
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "5s",

      "panels": [
        {
          "type": "timeseries",
          "title": "RPS (Requests per Second)",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total[5m]))",
              "legendFormat": "rps"
            }
          ]
        },

        {
          "type": "timeseries",
          "title": "Error Rate",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{status!=\"200\"}[5m])) / sum(rate(http_requests_total[5m]))",
              "legendFormat": "error rate"
            }
          ]
        },

        {
          "type": "timeseries",
          "title": "Latency p95",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p95"
            }
          ]
        },

        {
          "type": "timeseries",
          "title": "Cache Hits",
          "targets": [
            {
              "expr": "rate(cache_hits_total[5m])",
              "legendFormat": "hits/sec"
            }
          ]
        },

        {
          "type": "timeseries",
          "title": "Cache Misses",
          "targets": [
            {
              "expr": "rate(cache_miss_total[5m])",
              "legendFormat": "miss/sec"
            }
          ]
        },

        {
          "type": "timeseries",
          "title": "Success Rate (SLO)",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{status=\"200\"}[5m])) / sum(rate(http_requests_total[5m]))",
              "legendFormat": "success rate"
            }
          ]
        }
      ]
    }