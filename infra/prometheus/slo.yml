apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: deathstar-slo
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
  - name: deathstar-slo
    interval: 30s
    rules:

    # =========================
    # SLI — SUCCESS RATE
    # =========================
    - record: deathstar:success_rate:5m
      expr: |
        sum(rate(http_requests_total{path="/deathstar-analysis",status="200"}[5m]))
        /
        sum(rate(http_requests_total{path="/deathstar-analysis"}[5m]))

    # =========================
    # SLI — ERROR RATE
    # =========================
    - record: deathstar:error_rate:5m
      expr: |
        sum(rate(http_requests_total{path="/deathstar-analysis",status!="200"}[5m]))
        /
        sum(rate(http_requests_total{path="/deathstar-analysis"}[5m]))

    # =========================
    # SLI — LATENCY P95
    # =========================
    - record: deathstar:latency_p95:5m
      expr: |
        histogram_quantile(0.95,
          sum(rate(http_request_duration_seconds_bucket{path="/deathstar-analysis"}[5m])) by (le)
        )

    # =========================
    # ALERT — ERROR RATE ALTA
    # =========================
    - alert: DeathstarHighErrorRate
      expr: deathstar:error_rate:5m > 0.05
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "Alta taxa de erro na API Deathstar"
        description: "Mais de 5% das requisições estão falhando"