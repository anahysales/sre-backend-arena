apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: deathstar-slo
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
  - name: deathstar-slo
    interval: 30s
    rules:

    # =========================
    # SLI — SUCCESS RATE
    # =========================
    - record: deathstar:success_rate:5m
      expr: |
        sum(rate(http_requests_total{path="/deathstar-analysis",status=~"2.."}[5m]))
        /
        clamp_min(sum(rate(http_requests_total{path="/deathstar-analysis"}[5m])), 1)

    # =========================
    # SLI — ERROR RATE
    # =========================
    - record: deathstar:error_rate:5m
      expr: |
        sum(rate(http_requests_total{path="/deathstar-analysis",status=~"5.."}[5m]))
        /
        clamp_min(sum(rate(http_requests_total{path="/deathstar-analysis"}[5m])), 1)

    # =========================
    # SLI — LATENCY P95 (only success)
    # =========================
    - record: deathstar:latency_p95:5m
      expr: |
        histogram_quantile(
          0.95,
          sum(rate(http_request_duration_seconds_bucket{path="/deathstar-analysis",status=~"2.."}[5m])) by (le)
        )

    # =========================
    # SLO — ERROR BUDGET (BASE)
    # =========================
    - record: deathstar:error_budget_remaining:5m
      expr: |
        1 - deathstar:error_rate:5m