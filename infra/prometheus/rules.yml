groups:
  - name: deathstar-metrics
    rules:

      # =========================
      # LATÊNCIA p99 (GLOBAL)
      # Métrica base para observabilidade geral
      # =========================
      - record: job:http_request_duration_seconds:p99
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
          )

      # =========================
      # THROUGHPUT (RPS GLOBAL)
      # =========================
      - record: job:http_requests:rps
        expr: |
          sum(rate(http_requests_total[1m]))

      # =========================
      # ERROR RATE GLOBAL (SEM ALERTA)
      # Apenas métrica base para dashboards e análise
      # =========================
      - record: job:http_error_rate:5m
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m]))
          /
          clamp_min(
            sum(rate(http_requests_total[5m])),
            1
          )

      # =========================
      # ERROR RATE POR PATH
      # Útil para debug e drill-down
      # =========================
      - record: job:http_error_rate_by_path:5m
        expr: |
          sum by (path) (rate(http_requests_total{status=~"5.."}[5m]))
          /
          clamp_min(
            sum by (path) (rate(http_requests_total[5m])),
            1
          )