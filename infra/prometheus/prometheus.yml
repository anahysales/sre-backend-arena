global:
  scrape_interval: 5s
  scrape_timeout: 4s

rule_files:
  - "rules.yml"

scrape_configs:
  - job_name: "deathstar-api"

    metrics_path: /metrics

    static_configs:
      - targets: ["api:8081"]

    # =========================
    # LABEL ENRICHMENT (SRE BASE)
    # =========================
    relabel_configs:
      - target_label: service
        replacement: deathstar-api

      - target_label: environment
        replacement: local

      - target_label: cluster
        replacement: k3d

    # =========================
    # PROTECTION (BOA PRÁTICA)
    # =========================
    scrape_interval: 5s
    scrape_timeout: 4s